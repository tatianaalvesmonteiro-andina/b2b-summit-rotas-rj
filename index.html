<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Global Summit — Rotas RJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:    #E8001D;
      --black:  #0A0A0A;
      --dark:   #111318;
      --card:   #181B22;
      --border: rgba(255,255,255,0.07);
      --muted:  rgba(255,255,255,0.45);
      --white:  #FFFFFF;
      --accent: #FFD600;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 80px 24px 64px;
      text-align: center;
      background: var(--black);
      border-bottom: 1px solid var(--border);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(232,0,29,0.22) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
      pointer-events: none;
    }
    .hero-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid rgba(232,0,29,0.4);
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 24px;
      position: relative;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 100px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      position: relative;
    }
    .hero h1 span { color: var(--red); }
    .hero-sub {
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: relative;
    }
    .hero-cities {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 36px;
      flex-wrap: wrap;
      position: relative;
    }
    .hero-city {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-city span.dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      display: inline-block;
